name: PR Validation

on:
  pull_request:
    types: [opened, edited, synchronize, labeled, unlabeled]

jobs:
  check-pr-size:
    name: Check PR Cognitive Load
    runs-on: ubuntu-latest
    steps:
      - name: Verify PR stays within review budget
        uses: actions/github-script@v7
        with:
          script: |
            const limit = 400;
            const pr = context.payload.pull_request;
            const additions = pr.additions || 0;
            const deletions = pr.deletions || 0;
            const total = additions + deletions;
            const labels = (pr.labels || []).map(label => label.name);
            const hasException = labels.includes('size:exception');

            console.log(`PR size: +${additions} / -${deletions} = ${total} changed lines`);
            console.log(`Labels: ${labels.join(', ') || '(none)'}`);

            if (total <= limit) {
              console.log(`PR is within the ${limit}-line review budget.`);
              return;
            }

            const message =
              `PR changes ${total} lines (+${additions}/-${deletions}), exceeding the ${limit}-line review budget.\n\n` +
              'Reviews should stay small enough to complete in ~60 minutes without reviewer fatigue.\n' +
              'Either split this PR or add the size:exception label if the large diff is unavoidable.';

            if (hasException) {
              core.warning(message);
              console.log('size:exception label present; allowing oversized PR with warning.');
              return;
            }

            core.setFailed(message);
