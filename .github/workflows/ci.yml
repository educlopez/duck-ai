name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    name: Build & Vet
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...
