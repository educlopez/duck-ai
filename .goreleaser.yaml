version: 2

project_name: duck-ai

before:
  hooks:
    - go mod tidy

builds:
  - main: .
    binary: duck-ai
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE*

checksum:
  name_template: "checksums.txt"

changelog:
  use: git
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Refactor
      regexp: '^.*?refactor(\(.+\))??!?:.+$'
      order: 2
    - title: Others
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  draft: false
  prerelease: auto

brews:
  - repository:
      owner: educlopez
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    name: duck-ai
    homepage: "https://github.com/educlopez/duck-ai"
    description: "Multi-agent skill, command and agent installer for Claude Code, Codex, OpenCode and generic agents."
    license: "MIT"
    commit_msg_template: "chore: update duck-ai formula to {{ .Tag }}"

scoops:
  - repository:
      owner: educlopez
      name: scoop-bucket
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    name: duck-ai
    homepage: "https://github.com/educlopez/duck-ai"
    description: "Multi-agent skill, command and agent installer for Claude Code, Codex, OpenCode and generic agents."
    license: MIT
    commit_msg_template: "chore: update duck-ai to {{ .Tag }}"
